<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glass Ink Haven Shop</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #fff0f5; /* pastel pink */
      margin: 0;
      padding-bottom: 20px;
    }
    h1 {
      color: #8b008b;
      margin-top: 20px;
    }
    .product {
      border: 1px solid #ffb6c1;
      border-radius: 12px;
      padding: 15px;
      margin: 10px auto;
      width: 90%;
      max-width: 400px;
      background-color: #fff;
    }
    .product img {
      width: 100%;
      border-radius: 8px;
    }
    .product h2 {
      margin: 10px 0 5px 0;
      font-size: 20px;
    }
    .product p {
      margin: 5px 0;
      font-size: 16px;
    }

    /* Edited cart summary */
    .cart-summary {
      margin-top: 20px;
      font-size: 18px;
      background-color: #fff0f5;
      padding: 15px;
      border-top: 1px solid #ffb6c1;
      border-radius: 12px;
    }
    .cart-summary button {
      background-color: #ff69b4;
      color: white;
      padding: 10px 30px;
      font-size: 16px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 5px;
    }
    .cart-summary button:hover {
      background-color: #ff1493;
    }
  </style>
</head>
<body>

  <h1>Glass Ink Haven 💖</h1>
  <p>Shop and pay in USD</p>

  <div id="products"></div>

  <div class="cart-summary">
    <p>Total: $<span id="cartTotal">0</span></p>
    <button id="payBtn">Pay Now 💖</button>
  </div>

  <!-- Flutterwave SDK -->
  <script src="https://checkout.flutterwave.com/v3.js"></script>
  <script>
    const cart = {};
const productsDiv = document.getElementById("products");
const cartTotalSpan = document.getElementById("cartTotal");

// Fetch products from GitHub
fetch('https://raw.githubusercontent.com/princessnosa0627-ai/glass-ink-haven/main/products.json')
  .then(response => response.json())
  .then(products => {
    products.forEach(product => {
      const div = document.createElement("div");
      div.className = "product";
      div.innerHTML = `
        <img src="${product.img}" alt="${product.name}">
        <h2>${product.name}</h2>
        <p>$${product.price}</p>
        <button onclick="addToCart(${product.id})">Add to Cart</button>
      `;
      productsDiv.appendChild(div);
    });

    // Add/Update cart functions remain the same
    window.addToCart = function(id) {
      if(cart[id]) cart[id]++;
      else cart[id] = 1;
      updateCart();
    }

    function updateCart() {
      let total = 0;
      for(let id in cart) {
        const product = products.find(p => p.id == id);
        total += product.price * cart[id];
      }
      cartTotalSpan.textContent = total;
    }
  })
  .catch(err => console.error("Error fetching products:", err));

    function addToCart(id) {
      if(cart[id]) cart[id]++;
      else cart[id] = 1;
      updateCart();
    }

    function updateCart() {
      let total = 0;
      for(let id in cart) {
        const product = products.find(p => p.id == id);
        total += product.price * cart[id];
      }
      cartTotalSpan.textContent = total;
    }

    // Flutterwave payment
    const payBtn = document.getElementById("payBtn");
    payBtn.addEventListener("click", function() {
      const totalAmount = parseFloat(cartTotalSpan.textContent);
      if(totalAmount === 0) {
        alert("Add some products to cart first!");
        return;
      }

      FlutterwaveCheckout({
        public_key: "FLWPUBK-e5b0b3984de5cd1a81b4f591a0bf4481-X",
        tx_ref: "GIH_" + Date.now(),
        amount: totalAmount,
        currency: "USD",
        payment_options: "card, ussd, banktransfer",
        customer: {
          email: "test@example.com",
          phonenumber: "08012345678",
          name: "Princess"
        },
        customizations: {
          title: "Glass Ink Haven",
          description: "Payment for GIH products",
          logo: "https://i.imgur.com/PsGM8ej.png"
        },
        callback: function(response) {
          console.log("Payment successful:", response);
          alert("Payment Successful! Thank you 💖");
        },
        onclose: function() {
          console.log("Payment popup closed");
        }
      });
    });
  </script>

</body>
</html>
