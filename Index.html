<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glass Ink Haven | Wearable Therapy</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://checkout.flutterwave.com/v3.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body { font-family: Inter; background:#0a0a0a; color:white; }
.font-display{font-family:"Playfair Display",serif;}
.glass{background:rgba(255,255,255,0.03);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);}
.glass-dark{background:rgba(0,0,0,0.9);backdrop-filter:blur(20px);}
.gradient-text{background:linear-gradient(135deg,#667eea,#764ba2,#f5576c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

.cart-sidebar{transform:translateX(100%);transition:.4s;z-index:1000;}
.cart-sidebar.open{transform:translateX(0);}

.modal-overlay{opacity:0;visibility:hidden;transition:.3s;}
.modal-overlay.active{opacity:1;visibility:visible;}

.filter-btn.active{background:#667eea;color:#fff;}
</style>
</head>

<body>

<!-- NAV -->
<nav class="fixed top-0 w-full z-50 glass-dark px-6 py-4 flex justify-between">
<div class="font-display text-2xl">Glass Ink<span class="gradient-text">Haven</span></div>
<button onclick="toggleCart()">🛒 <span id="cart-count">0</span></button>
</nav>

<!-- HERO -->
<section class="min-h-screen flex flex-col justify-center items-center text-center px-6 pt-20">
<h1 class="font-display text-6xl md:text-8xl">Therapy You<br><span class="gradient-text italic">Can Wear</span></h1>
<p class="text-gray-400 max-w-xl mt-4">Wear your healing. Wear your story.</p>
<a href="#shop" class="mt-6 bg-white text-black px-6 py-3 rounded-full">Shop Collection</a>
</section>

<!-- SHOP -->
<section id="shop" class="px-6 py-20">

<h2 class="text-center font-display text-4xl mb-8">Wear Your Healing</h2>

<div class="flex flex-wrap justify-center gap-2 mb-8">
<button class="filter-btn active px-4 py-2 glass rounded-full text-sm" onclick="filterCategory('all',event)">All</button>
<button class="filter-btn px-4 py-2 glass rounded-full text-sm" onclick="filterCategory('hoodie',event)">Hoodies</button>
<button class="filter-btn px-4 py-2 glass rounded-full text-sm" onclick="filterCategory('tee',event)">Tees</button>
<button class="filter-btn px-4 py-2 glass rounded-full text-sm" onclick="filterCategory('tank',event)">Tanks</button>
<button class="filter-btn px-4 py-2 glass rounded-full text-sm" onclick="filterCategory('dress',event)">Dresses</button>
<button class="filter-btn px-4 py-2 glass rounded-full text-sm" onclick="filterCategory('pants',event)">Pants</button>
<button class="filter-btn px-4 py-2 glass rounded-full text-sm" onclick="filterCategory('tote',event)">Totes</button>
</div>

<div id="loading">Loading...</div>
<div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
</section>

<!-- FOOTER (RESTORED) -->
<footer class="py-16 px-6 border-t border-white/10 mt-20">
<div class="max-w-6xl mx-auto grid md:grid-cols-3 gap-10">

<div>
<h3 class="font-bold mb-2">Connect</h3>
<p class="text-gray-400">glassinkhaven@gmail.com</p>
</div>

<div>
<h3 class="font-bold mb-2">Support</h3>
<p class="text-gray-400">Shipping & Returns</p>
<p class="text-gray-400">FAQ</p>
</div>

<div>
<h3 class="font-bold mb-2">Socials</h3>
<p class="text-gray-400">Instagram @glassinkhaven_</p>
</div>

</div>
</footer>

<!-- CART -->
<div id="cart" class="cart-sidebar fixed right-0 top-0 w-full max-w-md h-full glass-dark p-6">
<h2 class="text-xl font-bold mb-4">Cart</h2>
<div id="cartItems"></div>
<p class="mt-4">Total: $<span id="total">0</span></p>
<button onclick="payNow()" class="mt-4 w-full bg-white text-black py-3 rounded">Checkout</button>
</div>

<script>

let products=[];
let cart=[];
const shipping=10;

// LOAD
window.onload=async()=>{
const res=await fetch('https://glassinkhaven1.netlify.app/.netlify/functions/printify');
const data=await res.json();
products=data.data||[];
render(products);
document.getElementById("loading").style.display="none";
};

// RENDER
function render(list){
const grid=document.getElementById("grid");

grid.innerHTML=list.map((p,i)=>`
<div class="glass p-4 rounded-xl">
<img src="${p.images?.[0]?.src}" class="w-full aspect-square object-cover rounded cursor-pointer" onclick="openProduct(${i})">
<h3 class="mt-2 font-bold">${p.title}</h3>
<p class="text-purple-400">$${((p.variants?.[0]?.price||0)/100).toFixed(2)}</p>
<button onclick="addToCart(${i})" class="mt-2 w-full bg-white/10 py-2 rounded">Add</button>
</div>
`).join("");
}

// FIXED FILTER (KEY PART 🔥)
function filterCategory(cat,event){

document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
event.target.classList.add("active");

if(cat==="all") return render(products);

// FIX: works even if Printify naming is messy
const filtered = products.filter(p=>{
const name=(p.title||"").toLowerCase();
const type=(p.product_type||"").toLowerCase();

const text=name+" "+type;

if(cat==="hoodie") return text.includes("hoodie");
if(cat==="tee") return text.includes("tee")||text.includes("t-shirt");
if(cat==="tank") return text.includes("tank");
if(cat==="dress") return text.includes("dress");
if(cat==="pants") return text.includes("pant");
if(cat==="tote") return text.includes("tote");

return true;
});

render(filtered);
}

// PRODUCT MODAL FIX (FULL MOCKUPS)
function openProduct(i){
const p=products[i];

const imgs=p.images.map(img=>`
<img src="${img.src}" class="rounded-lg w-full mb-2">
`).join("");

const modal=document.createElement("div");
modal.className="fixed inset-0 bg-black/90 flex justify-center items-center p-4";
modal.innerHTML=`
<div class="glass-dark p-6 max-w-3xl w-full rounded-xl relative">
<button onclick="this.parentElement.parentElement.remove()" class="absolute top-2 right-2">✕</button>
<div class="grid md:grid-cols-2 gap-4">
<div>${imgs}</div>
<div>
<h2 class="text-2xl font-bold">${p.title}</h2>
<p class="text-gray-400 mt-2">${p.description?.slice(0,200)||""}</p>
<button onclick="addToCart(${i});this.parentElement.parentElement.parentElement.remove()" class="mt-4 bg-white text-black px-4 py-2 rounded">Add</button>
</div>
</div>
</div>
`;

document.body.appendChild(modal);
}

// CART
function addToCart(i){
const p=products[i];
cart.push({
title:p.title,
price:(p.variants?.[0]?.price||0)/100,
img:p.images?.[0]?.src
});
updateCart();
toggleCart(true);
}

function updateCart(){
document.getElementById("cart-count").innerText=cart.length;

let total=0;
document.getElementById("cartItems").innerHTML=cart.map(c=>{
total+=c.price;
return `
<div class="flex justify-between text-sm mb-2">
<span>${c.title}</span>
<span>$${c.price.toFixed(2)}</span>
</div>
`;
}).join("");

document.getElementById("total").innerText=(total+shipping).toFixed(2);
}

function toggleCart(){
document.getElementById("cart").classList.toggle("open");
}

// PAYMENT
function payNow(){
if(cart.length===0) return alert("Cart empty");

FlutterwaveCheckout({
public_key:"FLWPUBK-e5b0b3984de5cd1a81b4f591a0bf4481-X",
tx_ref:"GIH_"+Date.now(),
amount:parseFloat(document.getElementById("total").innerText),
currency:"USD",
customer:{
name:"Customer",
email:"test@test.com"
},
callback:function(){
cart=[];
updateCart();
alert("Success!");
}
});
}

</script>

</body>
</html>
